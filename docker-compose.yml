services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mybooklist
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mybooklist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mybooklist"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    # Dockerfile será criado em backend/Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

  migrate:
    image: migrate/migrate:latest
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://mybooklist:mybooklist_dev@postgres:5432/mybooklist?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
